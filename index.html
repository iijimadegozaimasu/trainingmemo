<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>筋トレ記録 - Training Memo</title>
    <link rel="stylesheet" href="styles.css">
    <!-- React, ReactDOM, Babel for browser execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CATEGORIES = ['胸', '背中', '二頭筋', '三頭筋', '肩', '脚', 'その他'];
        
        const DEFAULT_EXERCISES = {
            '胸': ['ベンチプレス', 'ダンベルフライ', 'プッシュアップ'],
            '背中': ['懸垂', 'ラットプルダウン', 'デッドリフト', 'ワンハンドロー'],
            '二頭筋': ['アームカール', 'ハンマーカール'],
            '三頭筋': ['プレスダウン', 'ライイングエクステンション'],
            '肩': ['ショルダープレス', 'サイドレイズ', 'フロントレイズ'],
            '脚': ['スクワット', 'レッグプレス', 'レッグカール', 'カーフレイズ'],
            'その他': ['腹筋', 'プランク']
        };

        const toHankaku = (str) => {
            if (!str) return '';
            return str.replace(/[０-９]/g, (s) => {
                return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
            }).replace(/[．。]/g, '.');
        };

        const App = () => {
            const [records, setRecords] = useState([]);
            const [exerciseMaster, setExerciseMaster] = useState(DEFAULT_EXERCISES);
            
            const [category, setCategory] = useState(CATEGORIES[0]);
            const [exercise, setExercise] = useState('');
            const [newExerciseInput, setNewExerciseInput] = useState('');
            const [weight, setWeight] = useState('');
            const [reps, setReps] = useState('');
            const [sets, setSets] = useState('');
            
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDateStr, setSelectedDateStr] = useState(null);

            // 前回の同じ種目の記録を検索
            const lastRecord = useMemo(() => {
                return records.find(r => r.category === category && r.exercise === exercise);
            }, [category, exercise, records]);

            const copyLastRecord = () => {
                if (lastRecord) {
                    setWeight(lastRecord.weight);
                    setReps(lastRecord.reps);
                    setSets(lastRecord.sets);
                }
            };

            // 初期読み込み
            useEffect(() => {
                try {
                    const savedRecords = localStorage.getItem('training_memo_records');
                    if (savedRecords) setRecords(JSON.parse(savedRecords));

                    const savedMaster = localStorage.getItem('training_memo_exercises');
                    if (savedMaster) setExerciseMaster(JSON.parse(savedMaster));
                } catch (e) {
                    console.error("Failed to load from localStorage", e);
                }
            }, []);

            // カテゴリー変更時に種目をリセット
            useEffect(() => {
                const available = exerciseMaster[category] || [];
                if (available.length > 0) {
                    setExercise(available[0]);
                } else {
                    setExercise('');
                }
            }, [category, exerciseMaster]);

            // 保存
            useEffect(() => {
                localStorage.setItem('training_memo_records', JSON.stringify(records));
            }, [records]);

            useEffect(() => {
                localStorage.setItem('training_memo_exercises', JSON.stringify(exerciseMaster));
            }, [exerciseMaster]);

            const handleAddExerciseMaster = () => {
                if (!newExerciseInput.trim()) return;
                const trimmed = newExerciseInput.trim();
                
                const currentList = exerciseMaster[category] || [];
                if (currentList.includes(trimmed)) {
                    alert('その種目は既に追加されています。');
                    return;
                }

                const newMaster = {
                    ...exerciseMaster,
                    [category]: [...currentList, trimmed]
                };
                setExerciseMaster(newMaster);
                setExercise(trimmed);
                setNewExerciseInput('');
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!exercise || !weight || !reps || !sets) {
                    alert('項目をすべて入力・選択してください。');
                    return;
                }
                
                if (Number(weight) <= 0 || Number(reps) <= 0 || Number(sets) <= 0) {
                    alert('重量、回数、セット数は0より大きい値を入力してください。');
                    return;
                }

                const newRecord = {
                    id: Date.now().toString(),
                    date: new Date().toLocaleDateString('ja-JP'),
                    category,
                    exercise,
                    weight,
                    reps,
                    sets,
                };

                setRecords([newRecord, ...records]);
                setWeight('');
                setReps('');
                setSets('');
            };

            const deleteRecord = (id) => {
                if (confirm('この記録を削除しますか？')) {
                    setRecords(records.filter(record => record.id !== id));
                }
            };

            const calendarDays = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDayOfMonth = new Date(year, month, 1);
                const lastDayOfMonth = new Date(year, month + 1, 0);
                const days = [];
                const firstDayOfWeek = firstDayOfMonth.getDay();
                for (let i = firstDayOfWeek; i > 0; i--) {
                    days.push({ date: new Date(year, month, 1 - i), isCurrentMonth: false });
                }
                for (let i = 1; i <= lastDayOfMonth.getDate(); i++) {
                    days.push({ date: new Date(year, month, i), isCurrentMonth: true });
                }
                const remaining = 42 - days.length;
                for (let i = 1; i <= remaining; i++) {
                    days.push({ date: new Date(year, month + 1, i), isCurrentMonth: false });
                }
                return days;
            }, [currentDate]);

            const dayCategoriesMap = useMemo(() => {
                const map = {};
                records.forEach(r => {
                    if (!map[r.date]) map[r.date] = new Set();
                    map[r.date].add(r.category || 'その他');
                });
                return map;
            }, [records]);

            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            const toggleDateSelection = (dateStr) => setSelectedDateStr(selectedDateStr === dateStr ? null : dateStr);
            const filteredRecords = selectedDateStr ? records.filter(r => r.date === selectedDateStr) : records;
            const todayStr = new Date().toLocaleDateString('ja-JP');

            return (
                <div className="container">
                    <header>
                        <h1>TRAINING MEMO</h1>
                    </header>

                    <div className="form-card">
                        <form onSubmit={handleSubmit}>
                            <div className="form-row">
                                <div className="form-group">
                                    <label>1. カテゴリー</label>
                                    <select 
                                        value={category}
                                        onChange={(e) => setCategory(e.target.value)}
                                    >
                                        {CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>2. 種目を選択</label>
                                    <select 
                                        value={exercise}
                                        onChange={(e) => setExercise(e.target.value)}
                                    >
                                        {(exerciseMaster[category] || []).map(ex => <option key={ex} value={ex}>{ex}</option>)}
                                        {(!exerciseMaster[category] || exerciseMaster[category].length === 0) && <option value="">(種目を登録してください)</option>}
                                    </select>
                                </div>
                            </div>

                            <div style={{ marginTop: '0.5rem', marginBottom: '1.5rem', display: 'flex', gap: '0.5rem', alignItems: 'flex-end' }}>
                                <div style={{ flexGrow: 1 }}>
                                    <label style={{ fontSize: '0.75rem', color: '#64748b' }}>新しい種目を追加する</label>
                                    <input 
                                        type="text" 
                                        placeholder="例: インクラインプレス" 
                                        value={newExerciseInput}
                                        onChange={(e) => setNewExerciseInput(e.target.value)}
                                        style={{ marginTop: '0.25rem' }}
                                    />
                                </div>
                                <button 
                                    type="button" 
                                    onClick={handleAddExerciseMaster}
                                    style={{ width: 'auto', marginTop: 0, padding: '0.625rem 1rem', background: '#10b981' }}
                                >
                                    追加
                                </button>
                            </div>
                            
                            {/* 前回コピーボタン */}
                            {lastRecord && (
                                <div style={{ textAlign: 'right', marginBottom: '0.5rem' }}>
                                    <button 
                                        type="button" 
                                        onClick={copyLastRecord}
                                        style={{ 
                                            width: 'auto', 
                                            marginTop: 0, 
                                            padding: '0.4rem 0.8rem', 
                                            fontSize: '0.8rem', 
                                            background: 'white', 
                                            color: 'var(--primary-color)', 
                                            border: '1px solid var(--primary-color)' 
                                        }}
                                    >
                                        前回の記録（{lastRecord.weight}kg × {lastRecord.reps}回 × {lastRecord.sets}セット）をコピー
                                    </button>
                                </div>
                            )}

                            <div className="form-row">
                                <div className="form-group">
                                    <label>重量 (kg)</label>
                                    <input type="text" inputMode="decimal" placeholder="60" value={weight} onChange={(e) => setWeight(toHankaku(e.target.value))} required />
                                </div>
                                <div className="form-group">
                                    <label>回数</label>
                                    <input type="text" inputMode="numeric" placeholder="10" value={reps} onChange={(e) => setReps(toHankaku(e.target.value))} required />
                                </div>
                                <div className="form-group">
                                    <label>セット数</label>
                                    <input type="text" inputMode="numeric" placeholder="3" value={sets} onChange={(e) => setSets(toHankaku(e.target.value))} required />
                                </div>
                            </div>

                            <button type="submit" style={{ fontSize: '1.1rem', padding: '1rem' }}>記録する</button>
                        </form>
                    </div>

                    <div className="calendar-container">
                        <div className="calendar-header">
                            <button className="calendar-nav-btn" onClick={prevMonth}>&lt; 前月</button>
                            <h2>{currentDate.getFullYear()}年 {currentDate.getMonth() + 1}月</h2>
                            <button className="calendar-nav-btn" onClick={nextMonth}>次月 &gt;</button>
                        </div>
                        <div className="calendar-grid">
                            {['日', '月', '火', '水', '木', '金', '土'].map(day => <div key={day} className="calendar-day-head">{day}</div>)}
                            {calendarDays.map((d, i) => {
                                const dateStr = d.date.toLocaleDateString('ja-JP');
                                const dayCategories = dayCategoriesMap[dateStr] ? Array.from(dayCategoriesMap[dateStr]) : [];
                                const isSelected = selectedDateStr === dateStr;
                                const isToday = dateStr === todayStr;
                                return (
                                    <div 
                                        key={i} 
                                        className={`calendar-day ${d.isCurrentMonth ? '' : 'other-month'} ${isSelected ? 'selected' : ''} ${isToday ? 'today' : ''}`}
                                        onClick={() => toggleDateSelection(dateStr)}
                                    >
                                        <span style={{ fontSize: '0.85rem', fontWeight: 'bold', marginLeft: '4px' }}>{d.date.getDate()}</span>
                                        <div className="calendar-labels-container">
                                            {dayCategories.map(cat => (
                                                <div key={cat} className={`calendar-label cat-${cat}`}>{cat}</div>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="view-filter-info">
                        <span>{selectedDateStr ? `${selectedDateStr} の記録` : 'すべての履歴'}</span>
                        {selectedDateStr && <button className="clear-filter-btn" onClick={() => setSelectedDateStr(null)}>すべて表示</button>}
                    </div>

                    <div className="history-list">
                        {filteredRecords.length === 0 ? (
                            <div className="empty-state">{selectedDateStr ? 'この日の記録はありません。' : '記録がまだありません。'}</div>
                        ) : (
                            filteredRecords.map((record) => (
                                <div key={record.id} className="record-card">
                                    <div className="record-info">
                                        <div className="record-date">{record.date}</div>
                                        <div className={`category-badge cat-${record.category || 'その他'}`}>{record.category || 'その他'}</div>
                                        <div className="record-exercise">{record.exercise}</div>
                                        <div className="record-stats">{record.weight}kg × {record.reps}回 × {record.sets}セット</div>
                                    </div>
                                    <button className="delete-btn" onClick={() => deleteRecord(record.id)}>削除</button>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
